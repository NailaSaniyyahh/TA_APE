---
services:
  opensearch:
    image: opensearchproject/opensearch:3
    container_name: opensearchTA
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true  # along with the memlock settings below, disables swapping
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m  # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=KoTA404TABAH!    # Sets the demo admin user password when using demo configuration, required for OpenSearch 2.12 and higher
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536  # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    volumes:
      - opensearchTA-data:/container/path:/usr/share/opensearchTA/data
    ports:
      - 9200:9200
      - 9600:9600  # required for Performance Analyzer
    networks:
      - opensearchTA-net
  dashboard:
    image: opensearchproject/opensearch-dashboards:3
    container_name: dashboard
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["https://opensearchTA:9200"]'
    networks:
      - opensearchTA-net

volumes:
  opensearchTA-data:

networks:
  opensearchTA-net: